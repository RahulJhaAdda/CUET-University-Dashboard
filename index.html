<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUET University — Intelligence Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3e;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --accent4: #f7971e;
    --accent5: #00c6ff;
    --text: #e8e8f0;
    --muted: #8888aa;
    --tag-bg: rgba(108,99,255,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    background: linear-gradient(135deg, #0f0f1e 0%, #1a1a30 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(20px);
  }
  .header-inner {
    max-width: 1400px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 20px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo span { font-size: 12px; font-weight: 400; color: var(--muted); display: block; }

  /* ─── TABS ─── */
  .tabs {
    display: flex; gap: 4px;
    background: var(--surface);
    border-radius: 12px; padding: 4px;
  }
  .tab {
    padding: 8px 20px; border-radius: 8px;
    border: none; background: transparent;
    color: var(--muted); font-family: 'DM Sans'; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .tab.active { background: var(--accent); color: #fff; }
  .tab:hover:not(.active) { color: var(--text); background: var(--border); }

  /* ─── MAIN LAYOUT ─── */
  .page { display: none; }
  .page.active { display: block; }

  .container {
    max-width: 1400px; margin: 0 auto; padding: 32px;
  }

  /* ─── FILTERS PANEL ─── */
  .filters-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 24px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr auto;
    gap: 16px; align-items: end;
  }
  .filter-group label {
    display: block; font-size: 11px; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .filter-group select,
  .filter-group input {
    width: 100%; padding: 10px 14px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: 'DM Sans'; font-size: 14px;
    outline: none; transition: border-color 0.2s;
    -webkit-appearance: none; appearance: none;
    cursor: pointer;
  }
  .filter-group select:focus,
  .filter-group input:focus { border-color: var(--accent); }
  .filter-group input::placeholder { color: var(--muted); }

  .btn-reset {
    padding: 10px 20px; background: var(--border);
    border: none; border-radius: 10px; color: var(--muted);
    font-family: 'DM Sans'; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .btn-reset:hover { background: var(--accent); color: #fff; }

  /* ─── STATS BAR ─── */
  .stats-bar {
    display: flex; gap: 16px; margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .stat-chip {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 20px;
    display: flex; align-items: center; gap: 10px;
    min-width: 140px;
  }
  .stat-chip .icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .stat-chip .val { font-size: 22px; font-weight: 700; font-family: 'Syne'; }
  .stat-chip .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }

  /* ─── RESULTS GRID ─── */
  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
  }

  .course-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 20px;
    transition: all 0.25s; position: relative; overflow: hidden;
  }
  .course-card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
  }
  .course-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(108,99,255,0.15);
  }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 12px; }
  .uni-badge {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    padding: 4px 10px; border-radius: 6px; white-space: nowrap; flex-shrink: 0;
  }
  .degree-type {
    font-size: 11px; color: var(--muted); background: var(--surface);
    padding: 3px 10px; border-radius: 6px; font-weight: 500;
  }

  .course-name {
    font-family: 'Syne'; font-weight: 700; font-size: 15px;
    margin-bottom: 8px; line-height: 1.3;
  }

  .subject-combo {
    margin-bottom: 12px;
  }
  .combo-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .combo-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .combo-tag {
    font-size: 11px; padding: 3px 10px;
    background: var(--tag-bg); border: 1px solid rgba(108,99,255,0.25);
    border-radius: 20px; color: #b0aaff;
  }

  .eligibility-box {
    background: var(--surface); border-radius: 10px; padding: 12px;
    font-size: 12px; line-height: 1.6; color: #c0c0d8;
    max-height: 80px; overflow: hidden; position: relative;
    transition: max-height 0.3s;
  }
  .eligibility-box.expanded { max-height: 500px; }
  .eligibility-box::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 30px;
    background: linear-gradient(transparent, var(--surface));
    pointer-events: none; transition: opacity 0.3s;
  }
  .eligibility-box.expanded::after { opacity: 0; }
  .expand-btn {
    display: inline-block; margin-top: 6px;
    font-size: 11px; color: var(--accent); cursor: pointer;
    font-weight: 500; background: none; border: none; padding: 0;
  }
  .expand-btn:hover { text-decoration: underline; }

  .no-results {
    grid-column: 1 / -1;
    text-align: center; padding: 80px 20px;
    color: var(--muted);
  }
  .no-results h3 { font-family: 'Syne'; font-size: 24px; margin-bottom: 8px; }

  /* ─── FAQ PAGE ─── */
  .faq-filters {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px; margin-bottom: 24px;
    display: grid;
    grid-template-columns: 2fr 1fr 1fr auto;
    gap: 16px; align-items: end;
  }

  .faq-grid { display: flex; flex-direction: column; gap: 12px; }

  .faq-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
    transition: all 0.2s;
  }
  .faq-card:hover { border-color: var(--accent); }

  .faq-question {
    padding: 18px 20px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    gap: 16px;
  }
  .faq-q-text { font-weight: 600; font-size: 14px; line-height: 1.4; flex: 1; }
  .faq-cat {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; padding: 3px 10px; border-radius: 6px;
    white-space: nowrap; flex-shrink: 0;
  }
  .faq-chevron {
    flex-shrink: 0; color: var(--muted); font-size: 18px;
    transition: transform 0.3s;
  }
  .faq-card.open .faq-chevron { transform: rotate(180deg); }
  .faq-answer {
    display: none; padding: 0 20px 18px;
    font-size: 13px; line-height: 1.7; color: #c0c0d8;
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }
  .faq-card.open .faq-answer { display: block; }

  .faq-no-results {
    text-align: center; padding: 60px; color: var(--muted);
  }

  /* ─── UNI COLOR THEMES ─── */
  .uni-JNU::before { background: var(--accent); }
  .uni-JMI::before { background: var(--accent2); }
  .uni-BHU::before { background: var(--accent3); }
  .uni-AMU::before { background: var(--accent4); }
  .uni-DU::before  { background: var(--accent5); }

  .badge-JNU { background: rgba(108,99,255,0.15); color: #a09aff; }
  .badge-JMI { background: rgba(255,101,132,0.15); color: #ff9aaa; }
  .badge-BHU { background: rgba(67,233,123,0.15); color: #6ef99d; }
  .badge-AMU { background: rgba(247,151,30,0.15); color: #ffb85c; }
  .badge-DU  { background: rgba(0,198,255,0.15); color: #6adeff; }

  .cat-general    { background: rgba(108,99,255,0.15); color: #a09aff; }
  .cat-eligibility{ background: rgba(67,233,123,0.15); color: #6ef99d; }
  .cat-cuet       { background: rgba(0,198,255,0.15); color: #6adeff; }
  .cat-admission  { background: rgba(247,151,30,0.15); color: #ffb85c; }
  .cat-reservation{ background: rgba(255,101,132,0.15); color: #ff9aaa; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 900px) {
    .filters-panel, .faq-filters {
      grid-template-columns: 1fr 1fr;
    }
    .results-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 600px) {
    .filters-panel, .faq-filters { grid-template-columns: 1fr; }
    .container { padding: 16px; }
    .header-inner { padding: 0; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .highlight { background: rgba(108,99,255,0.3); border-radius: 3px; padding: 0 2px; }
</style>
</head>

const faqs = [
  // GENERAL
  { q:"What is CUET (UG) 2025?", a:"CUET (UG) stands for Common University Entrance Test for Undergraduate admissions. It is a centralized entrance exam conducted by NTA (National Testing Agency) for admission to undergraduate programmes in central universities across India, including JNU, JMI, BHU, AMU, and DU for the academic session 2025-26.", cat:"general", uni:"general" },
  { q:"Which universities accept CUET (UG) 2025 scores?", a:"All central universities are mandatorily required to use CUET (UG) scores for UG admissions. This includes JNU, JMI (Jamia Millia Islamia), BHU (Banaras Hindu University), AMU (Aligarh Muslim University), DU (University of Delhi), and many more. State universities may also participate.", cat:"general", uni:"general" },
  { q:"What is the medium of CUET (UG) 2025 exam?", a:"CUET (UG) 2025 is available in 13 languages: English, Hindi, Assamese, Bengali, Gujarati, Kannada, Malayalam, Marathi, Odia, Punjabi, Tamil, Telugu, and Urdu. Candidates can choose their preferred medium at the time of application.", cat:"cuet", uni:"general" },
  { q:"What are the three sections of CUET (UG)?", a:"CUET (UG) has three sections: Section IA & IB (Languages) — 13 languages in Section IA and 19 languages in Section IB; Section II (Domain-Specific Subjects) — 27 domain subjects aligned with Class XII subjects; Section III (General Aptitude Test) — tests quantitative reasoning, logical and analytical reasoning, general mental ability, and numerical ability.", cat:"cuet", uni:"general" },
  { q:"What is the pattern/duration of CUET (UG) 2025 test?", a:"Each Language and Domain Subject test is of 45 minutes duration. The General Aptitude Test (Section III) is also 45 minutes. Questions are MCQ-based (Multiple Choice Questions). The marking scheme is typically +5 for correct answer, -1 for incorrect answer.", cat:"cuet", uni:"general" },
  { q:"Can a candidate appear in multiple subjects in CUET?", a:"Yes. Candidates can appear in multiple domain subjects and language tests. However, the combination of subjects must match the eligibility requirement of the university and course they are applying to. Most universities specify a mandatory combination of 3-4 subjects.", cat:"cuet", uni:"general" },
  { q:"What is the application fee for CUET (UG) 2025?", a:"The application fee varies by category and number of subjects opted. General category candidates pay ₹650 for up to 3 subjects. OBC-NCL/EWS candidates pay ₹600. SC/ST/PwD/Third Gender candidates pay ₹550. Additional subjects beyond 3 may attract extra charges.", cat:"general", uni:"general" },
  { q:"What is the registration process for CUET (UG) 2025?", a:"Candidates must register online at the NTA CUET official portal (cuet.nta.nic.in). The steps include: (1) Register with basic details and get an Application Number, (2) Fill in academic and personal details, (3) Choose subjects/tests, (4) Upload documents (photo, signature), (5) Pay application fee online, (6) Download and save the confirmation page.", cat:"admission", uni:"general" },

  // ELIGIBILITY
  { q:"What is the minimum marks required in Class 12 for CUET-based admissions?", a:"It varies by university and course. JNU requires a minimum of 45% marks in 10+2. JMI requires 45%–50% depending on the course. BHU requires a minimum of 50% marks in aggregate for most UG programmes. AMU requires 45%–50% depending on the course. DU does not prescribe a minimum percentage for CUET-based admissions — CUET score is the merit basis.", cat:"eligibility", uni:"general" },
  { q:"Are Class 12 appearing candidates eligible to apply for CUET 2025?", a:"Yes. Candidates who are currently appearing in their Class 12 board exams in 2025 are eligible to apply for CUET (UG) 2025. However, admission will be subject to passing the qualifying examination with the required minimum marks as per the specific university's criteria.", cat:"eligibility", uni:"general" },
  { q:"Is there an age limit for CUET (UG) 2025?", a:"NTA has not prescribed any age limit for appearing in CUET (UG) 2025. However, individual universities may have their own age restrictions. For example, BHU specifies age limits for various courses: Not more than 22 years for most UG programmes (on 1st July 2025), 16-25 years for B.Sc. (Hons.) Agriculture, and 17-25 years for B.Tech courses.", cat:"eligibility", uni:"BHU" },
  { q:"What is the minimum eligibility for JNU undergraduate programmes?", a:"For most UG programmes at JNU, candidates must have passed Senior School Certificate (10+2) or equivalent with a minimum of 45% marks in aggregate. SC/ST and PwD candidates are eligible irrespective of percentage. OBC (Non-Creamy Layer) candidates get a 10% relaxation in minimum marks. Candidates with 10+1 pattern are eligible if they completed First Year of Bachelor's degree with 45% marks.", cat:"eligibility", uni:"JNU" },
  { q:"What is the eligibility for JMI undergraduate admissions?", a:"For most UG programmes at JMI, candidates need Senior Secondary Certificate or equivalent with not less than 50% marks in aggregate of best 5 papers or in the subject concerned. B.A. (Hons.) Sanskrit requires only 45% marks. B.A. (Hons.) Urdu requires 45% in aggregate OR 50% in the subject concerned. Diploma programmes additionally require a Certificate Course in the concerned language.", cat:"eligibility", uni:"JMI" },
  { q:"What is the minimum eligibility for AMU undergraduate admissions?", a:"For most B.A. (Hons.) programmes at AMU, candidates must have Senior Secondary School Certificate or equivalent with not less than 50% marks in aggregate. Alternatively, candidates with Degree/Sanad from AMU recognized Institution/Madrasa with at least 50% marks are also eligible. B.Voc programmes at AMU require 45% marks.", cat:"eligibility", uni:"AMU" },
  { q:"Does University of Delhi (DU) have a minimum percentage requirement for CUET admissions?", a:"DU does not specify a minimum percentage cutoff for CUET-based admissions at the university level. Admission is purely based on CUET scores in the specified subject combinations. However, candidates must have passed 10+2 or equivalent examination from a recognized board. The merit list is prepared based on best CUET score obtained from any of the specified subject combinations.", cat:"eligibility", uni:"DU" },
  { q:"Are Madrasa certificate holders eligible for JNU admissions?", a:"Yes. JNU accepts Certificate of Alimiah with at least 45% marks issued by a specific list of recognized Madrasas including Darul Uloom Deoband, Mazahirul Uloom Saharanpur, Nadwatul Ulema Lucknow, and 25+ others. Candidates must also have passed English language at the level of Senior Secondary from a recognized Board. A Certificate of Maulvi from Bihar Board of Madrasa Education and Certificate of Senior Secondary from Urdu Education Board, New Delhi are also accepted.", cat:"eligibility", uni:"JNU" },
  { q:"Can 10+1 pattern candidates apply for JNU admissions?", a:"Yes. Candidates who have obtained their Higher Secondary Certificate under the 10+1 pattern of education will be eligible for admission to B.A. programmes at JNU if they have successfully completed the First-Year of Bachelor's degree examination of a University under 10+1+3 pattern with the prescribed percentage of marks (i.e., 45%).", cat:"eligibility", uni:"JNU" },

  // CUET EXAM SPECIFICS
  { q:"What is List A and List B in DU's CUET subject combinations?", a:"List A contains 14 Languages: English, Hindi, Assamese, Bengali, Gujarati, Kannada, Malayalam, Marathi, Odia, Punjabi, Tamil, Telugu, Urdu, Sanskrit. List B contains 22 Domain Subjects: Accountancy/Book Keeping, Agriculture, Anthropology, Biology/Biotechnology/Biochemistry, Business Studies, Chemistry, Environmental Science, Computer Science/Information Practices, Economics/Business Economics, Fine Arts, Geography/Geology, History, Home Science, Knowledge Tradition-Practices in India, Mass Media/Mass Communication, Mathematics/Applied Mathematics, Performing Arts, Physical Education, Physics, Political Science, Psychology, Sociology.", cat:"cuet", uni:"DU" },
  { q:"What is Section III (General Aptitude Test) in CUET?", a:"Section III is the General Aptitude Test of CUET (UG). It tests general mental ability, quantitative reasoning, numerical ability, logical and analytical reasoning, and general awareness. Some DU programmes (like B.A. Hindi, B.A. Journalism, BMS, BBA-FIA, B.Sc. Applied Life Science) use Section III as part of their required subject combination. Note: The weightage of CUET Sections is not the same, so appropriate proration is done by universities using this section.", cat:"cuet", uni:"general" },
  { q:"What does 'Performance-Based Test' mean for DU admissions?", a:"For certain DU programmes like B.Sc. Physical Education (PE, HE & S), B.A. (Hons.) in Music, Hindustani Music, and Karnatak Music, candidates must appear in both CUET AND a Performance-Based Test conducted by DU. The final merit is calculated as: CUET score (50% weightage) + Performance-based test score (50% weightage). The Performance-Based Test for PE involves physical performance; for Music, it involves musical performance in the relevant instrument or vocal.", cat:"cuet", uni:"DU" },
  { q:"What is the 'Practical-Based Test' for DU's Bachelor of Fine Arts?", a:"For the Bachelor of Fine Arts at DU, candidates must appear in CUET (Language from List A + General Aptitude Test/Section III) AND a Practical-Based Test conducted by College of Art. For specialization in Art History, the practical test is based on Analysis/Premise and View/Critique. For all other five specializations, it is based on Drawing and relevant Specialization. Merit = CUET score (50%) + Practical-based test score (50%).", cat:"cuet", uni:"DU" },
  { q:"What subjects are mandatory for JNU's B.Sc. Ayurveda Biology programme?", a:"For B.Sc. Programme in Ayurveda Biology at JNU, candidates must appear for: Sanskrit Test (Paper Code 325) — COMPULSORY, Physics (Paper Code 322) — COMPULSORY, Chemistry (Paper Code 306) — COMPULSORY, General Aptitude Test (Paper Code 501) — COMPULSORY, and either Biology (Paper Code 304) OR Mathematics (Paper Code 319) as the 5th subject (optional). If a candidate appears in both Biology and Mathematics, the subject with higher marks will be used for merit.", cat:"cuet", uni:"JNU" },
  { q:"How does BHU calculate merit for CUET admissions?", a:"BHU uses CUET scores for merit-based admissions. For B.A. (Hons.) programmes, candidates must appear in Language Test (English 101 or Hindi 102) + General Aptitude Test (501). For Science programmes, specific subject combinations like Chemistry + Mathematics + Physics or Biology + Chemistry + Physics are required. For performing arts programmes, CUET score is combined with Practical Examination scores conducted at BHU campus.", cat:"cuet", uni:"BHU" },
  { q:"What is the mandatory CUET subject rule for DU candidates?", a:"It is mandatory for DU candidates to appear in CUET (UG) 2025 in those subjects in which they are appearing or have passed in Class XII. This means candidates cannot appear in subjects in CUET that they haven't studied in Class XII. Merit is based on the best CUET score obtained from any of the specified subject combinations for the course applied to.", cat:"cuet", uni:"DU" },

  // ADMISSION PROCESS
  { q:"How does the seat allocation work after CUET results?", a:"After CUET results are declared, universities release their separate merit lists or cut-offs based on CUET scores in the specified subject combinations. Candidates who meet the cutoff apply to specific colleges/departments. Universities then release multiple rounds of seat allotment (typically Round 1, Round 2, Spot Round). Candidates must accept allotted seats within the specified deadline and complete the admission formalities including document verification and fee payment.", cat:"admission", uni:"general" },
  { q:"Can a candidate apply to multiple universities through CUET?", a:"Yes. CUET (UG) is a single exam for multiple universities. One CUET score can be used to apply to multiple central universities simultaneously. After results, candidates must separately apply to each university/college they wish to seek admission in, using their CUET scores, within the university's specified application window.", cat:"admission", uni:"general" },
  { q:"What documents are required for CUET-based admissions?", a:"Generally required documents include: (1) Class 10 marksheet/certificate for date of birth proof, (2) Class 12 marksheet/pass certificate or admit card if appearing, (3) CUET scorecard, (4) Category certificate (OBC-NCL/SC/ST/EWS/PwD) if applicable, (5) Photo ID proof (Aadhaar, Passport, etc.), (6) Passport-size photographs, (7) Migration certificate (if applicable), (8) Income certificate for OBC-NCL category.", cat:"admission", uni:"general" },
  { q:"When will CUET (UG) 2025 exam be conducted?", a:"CUET (UG) 2025 is expected to be conducted between May and June 2025 (exact dates announced by NTA). Candidates should regularly check the official NTA website (nta.ac.in) and CUET official portal (cuet.nta.nic.in) for exact dates, admit card release, and result declaration schedules.", cat:"admission", uni:"general" },
  { q:"Is there a normalization process for CUET scores?", a:"Yes. Since CUET is conducted across multiple shifts and dates, NTA applies a normalization procedure to ensure fairness across different question paper sets. The normalized scores (percentile scores) are used for merit/ranking purposes. This means the raw marks may be adjusted through statistical normalization to account for difficulty variations across sessions.", cat:"admission", uni:"general" },

  // RESERVATION
  { q:"What are the reservation norms for central universities under CUET?", a:"Central universities follow Government of India reservation norms: SC — 15% of seats, ST — 7.5% of seats, OBC-NCL (Non-Creamy Layer) — 27% of seats, EWS (Economically Weaker Section) — 10% of seats, PwD (Persons with Disability) — 5% horizontal reservation across all categories.", cat:"reservation", uni:"general" },
  { q:"What relaxation in marks do OBC candidates get for JNU admissions?", a:"OBC (Non-Creamy Layer) candidates at JNU are eligible for 10% relaxation in the percentage of marks in the qualifying examination in relation to the open category. So if the minimum is 45% for general category, OBC-NCL candidates need only 35% (i.e., 10% less than the prescribed minimum).", cat:"reservation", uni:"JNU" },
  { q:"What is the admission relaxation for SC/ST and PwD candidates?", a:"At JNU, SC/ST and PwD candidates who have passed the qualifying examination are eligible to appear in the Entrance Examination irrespective of their percentage of marks in the qualifying examination. At BHU, SC/ST candidates get 40% minimum qualifying marks (compared to 50% for General and 45% for OBC) for LL.B. programme. At AMU and DU, similar relaxation norms apply as per Government of India guidelines.", cat:"reservation", uni:"general" },
  { q:"What is the EWS (Economically Weaker Section) category in CUET admissions?", a:"EWS category was introduced to provide 10% reservation to economically weaker sections of the General (Unreserved) category whose family income is less than ₹8 lakh per annum and who do not belong to SC/ST/OBC category. EWS candidates must produce an income and asset certificate issued by a competent authority (Tehsildar/SDM/DM) to avail this reservation.", cat:"reservation", uni:"general" },
  { q:"Is there a supernumerary/additional seat provision for any category?", a:"JNU has an 80% seats rule: 80% of seats in B.A. (Hons.) programmes in the School of Languages are earmarked for candidates who have passed Senior School Certificate in 2024 or are due to appear in 2025. The remaining 20% are open to all other candidates. Some universities also provide supernumerary seats for NRI/foreign national candidates, Kashmiri migrants, sports quota, etc.", cat:"reservation", uni:"JNU" },
];

/* ═══════════════════════════════════════════════
   RENDERING — UNIVERSITIES
═══════════════════════════════════════════════ */
function applyFilters() {
  const search = document.getElementById('searchCourse').value.toLowerCase();
  const uni = document.getElementById('filterUni').value;
  const degree = document.getElementById('filterDegree').value;
  const subject = document.getElementById('filterSubject').value;

  const filtered = courses.filter(c => {
    const matchSearch = !search || c.course.toLowerCase().includes(search) || c.uniName.toLowerCase().includes(search);
    const matchUni = !uni || c.uni === uni;
    const matchDegree = !degree || c.degree.includes(degree);
    const matchSubject = !subject || c.subjects.some(s => s.toLowerCase().includes(subject.toLowerCase())) || c.eligibility.toLowerCase().includes(subject.toLowerCase());
    return matchSearch && matchUni && matchDegree && matchSubject;
  });

  renderCards(filtered);
  updateStats(filtered);
}

function renderCards(data) {
  const grid = document.getElementById('resultsGrid');
  if (data.length === 0) {
    grid.innerHTML = `<div class="no-results"><h3>No courses found</h3><p>Try adjusting your filters or search query.</p></div>`;
    return;
  }
  grid.innerHTML = data.map((c, i) => `
    <div class="course-card uni-${c.uni}">
      <div class="card-header">
        <span class="uni-badge badge-${c.uni}">${c.uni} · ${c.uniName}</span>
        <span class="degree-type">${c.degree}</span>
      </div>
      <div class="course-name">${c.course}</div>
      <div class="subject-combo">
        <div class="combo-label">📚 Subject Combination / Domain</div>
        <div class="combo-tags">
          ${c.subjects.map(s => `<span class="combo-tag">${s}</span>`).join('')}
        </div>
      </div>
      <div class="combo-label" style="margin-bottom:6px">✅ Eligibility Criteria</div>
      <div class="eligibility-box" id="elig-${i}">${c.eligibility}</div>
      <button class="expand-btn" onclick="toggleElig(${i}, this)">Show more ▾</button>
    </div>
  `).join('');
}

function toggleElig(i, btn) {
  const box = document.getElementById('elig-'+i);
  box.classList.toggle('expanded');
  btn.textContent = box.classList.contains('expanded') ? 'Show less ▴' : 'Show more ▾';
}

function updateStats(filtered) {
  const unis = new Set(filtered.map(c => c.uni));
  const degrees = new Set(filtered.map(c => c.degree));
  document.getElementById('statUnis').textContent = unis.size;
  document.getElementById('statCourses').textContent = filtered.length;
  document.getElementById('statDegrees').textContent = degrees.size;
}

function resetFilters() {
  document.getElementById('searchCourse').value = '';
  document.getElementById('filterUni').value = '';
  document.getElementById('filterDegree').value = '';
  document.getElementById('filterSubject').value = '';
  applyFilters();
}

/* ═══════════════════════════════════════════════
   RENDERING — FAQs
═══════════════════════════════════════════════ */
function applyFaqFilters() {
  const search = document.getElementById('faqSearch').value.toLowerCase();
  const cat = document.getElementById('faqCatFilter').value;
  const uni = document.getElementById('faqUniFilter').value;

  const filtered = faqs.filter(f => {
    const matchSearch = !search || f.q.toLowerCase().includes(search) || f.a.toLowerCase().includes(search);
    const matchCat = !cat || f.cat === cat;
    const matchUni = !uni || f.uni === uni;
    return matchSearch && matchCat && matchUni;
  });

  renderFaqs(filtered);
  document.getElementById('faqCount').textContent = filtered.length;
}

const catLabels = { general:'General', eligibility:'Eligibility', cuet:'CUET Exam', admission:'Admission', reservation:'Reservation' };
const catColors = { general:'cat-general', eligibility:'cat-eligibility', cuet:'cat-cuet', admission:'cat-admission', reservation:'cat-reservation' };

function renderFaqs(data) {
  const grid = document.getElementById('faqGrid');
  if (data.length === 0) {
    grid.innerHTML = `<div class="faq-no-results"><h3 style="font-family:Syne;margin-bottom:8px">No FAQs found</h3><p>Try different search terms or filters.</p></div>`;
    return;
  }
  grid.innerHTML = data.map((f, i) => `
    <div class="faq-card" id="faq-${i}">
      <div class="faq-question" onclick="toggleFaq(${i})">
        <div class="faq-q-text">${f.q}</div>
        <span class="faq-cat ${catColors[f.cat]}">${catLabels[f.cat]}</span>
        <span class="faq-chevron">⌄</span>
      </div>
      <div class="faq-answer">${f.a}</div>
    </div>
  `).join('');
}

function toggleFaq(i) {
  document.getElementById('faq-'+i).classList.toggle('open');
}

function resetFaqFilters() {
  document.getElementById('faqSearch').value = '';
  document.getElementById('faqCatFilter').value = '';
  document.getElementById('faqUniFilter').value = '';
  applyFaqFilters();
}

/* ═══════════════════════════════════════════════
   PAGE SWITCH
═══════════════════════════════════════════════ */
function switchPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  event.target.classList.add('active');
}

/* INIT */
applyFilters();
applyFaqFilters();
</script>
